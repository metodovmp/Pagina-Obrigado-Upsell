<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Versão Turbo Ativada</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <style>
    body { 
      margin: 0; 
      background: #000; 
      font-family: Arial, sans-serif; 
      color: #fff; 
      display: flex; 
      align-items: center; 
      justify-content: center; 
      min-height: 100vh;
      text-align: center;
    }
    .container { 
      max-width: 400px; 
      width: 100%; 
      padding: 40px 24px; 
      box-sizing: border-box; 
    }
    .check { 
      width: 64px; 
      height: 64px; 
      background: #00C853; 
      border-radius: 50%; 
      display: flex; 
      align-items: center; 
      justify-content: center; 
      margin: 0 auto 24px; 
      font-size: 36px; 
    }
    h1 { 
      color: #FFD700; 
      font-size: 22px; 
      margin: 0 0 12px 0; 
      font-weight: 600; 
      letter-spacing: 1px; 
    }
    .sub { 
      color: #EAEAEA; 
      font-size: 14px; 
      line-height: 1.6; 
      margin-bottom: 32px; 
      opacity: 0.9; 
    }
    .box { 
      background: #111; 
      border: 1px solid #222; 
      border-radius: 8px; 
      padding: 20px; 
      margin-bottom: 28px; 
      text-align: left; 
    }
    .box-title { 
      color: #FFD700; 
      font-size: 13px; 
      font-weight: bold; 
      margin-bottom: 12px; 
      text-transform: uppercase; 
    }
    .box p { 
      margin: 0; 
      font-size: 14px; 
      line-height: 1.7; 
      color: #EAEAEA; 
    }
    .btn { 
      display: block; 
      width: 100%; 
      padding: 18px; 
      background: #FFD700; 
      color: #000; 
      text-decoration: none; 
      font-weight: bold; 
      font-size: 15px; 
      border-radius: 999px; 
      margin-bottom: 24px; 
    }
    .suporte { 
      font-size: 12px; 
      color: #666; 
      line-height: 1.6; 
    }
    .suporte a { 
      color: #FFD700; 
      text-decoration: none; 
    }
  </style>
</head>
<body>
<div class="container">
  
  <div class="check">✓</div>
  
  <h1>VERSÃO TURBO ATIVADA</h1>
  <div class="sub">Seu upgrade foi aprovado com sucesso.</div>

  <div class="box">
    <div class="box-title">Você receberá 2 e-mails:</div>
    <p>
    1. <strong>Acesso aos 7 Protocolos</strong><br>
    2. <strong>Acesso à Versão Turbo</strong><br><br>
    Chegam em até 5 minutos. Verifique o spam.
    </p>
  </div>

  <a href="LINK_DA_AREA_DE_MEMBROS_TURBO" class="btn">
    ACESSAR VERSÃO TURBO
  </a>

  <div class="suporte">
    Dúvidas? <a href="mailto:contato@presencasilenciosa.com.br">contato@presencasilenciosa.com.br</a>
  </div>

</div>
</body>
    </html>
